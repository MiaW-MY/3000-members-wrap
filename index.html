<body>
  <div id="deck" class="deck" aria-label="BA Career Meetup celebration slides">
    <p style="padding:24px;text-align:center;color:#6B4E9B">Loading…</p>
  </div>

  <div class="progress" id="progress" aria-hidden="true"></div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VT3J1LFYX7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    const isDebug = new URLSearchParams(location.search).has('debug');
    gtag('config', 'G-VT3J1LFYX7', isDebug ? { debug_mode: true } : {});

    const viewedScreens = new Set();
    window.trackScreen = (screenId, screenIndex, screenName) => {
      if (!screenId || viewedScreens.has(screenId)) return;
      viewedScreens.add(screenId);
      const label = screenName || screenId;
      gtag('event', 'screen_view', {
        screen_name: label,
        screen_class: screenId,
        screen_index: screenIndex,
      });
      if (isDebug) console.log('[analytics] screen_view', label, screenIndex);
    };

    window.dispatchEvent(new Event('firebase-ready'));
  </script>
  <script defer src="js/content.js?v=98"></script>
  <script defer src="js/app.js?v=98"></script>
</body>
</html>
