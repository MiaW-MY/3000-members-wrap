    import { getAnalytics, logEvent } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js';

    const firebaseConfig = {

      measurementId: 'G-VT3J1LFYX7',
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const viewedScreens = new Set();

    window.trackScreen = (screenId, screenIndex) => {
      if (!screenId || viewedScreens.has(screenId)) return;
      viewedScreens.add(screenId);
      logEvent(analytics, 'screen_view', { screen_id: screenId, screen_index: screenIndex });
    };
  </script>
